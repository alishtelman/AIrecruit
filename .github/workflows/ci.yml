name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: recruiting
          POSTGRES_USER: recruiting
          POSTGRES_PASSWORD: recruiting
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recruiting -d recruiting"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://recruiting:recruiting@127.0.0.1:5432/recruiting
      TEST_DATABASE_URL: postgresql+asyncpg://recruiting:recruiting@127.0.0.1:5432/recruiting
      TEST_BASE_URL: http://127.0.0.1:8001
      SECRET_KEY: ci-test-secret-key-please-replace-in-real-envs-123456
      APP_URL: http://127.0.0.1:3000
      CORS_ORIGINS: http://127.0.0.1:3000
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: python -m compileall app tests
      - name: Start backend
        run: uvicorn app.main:app --host 127.0.0.1 --port 8001 > /tmp/backend.log 2>&1 &
      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8001/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/backend.log
          exit 1
      - run: python -m pytest tests/test_auth.py tests/test_candidate_privacy.py tests/test_company_collaboration_roles.py tests/test_company_search_shortlists.py tests/test_employee_assessments.py -v

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
