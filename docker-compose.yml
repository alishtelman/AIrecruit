services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: recruiting
      POSTGRES_PASSWORD: recruiting
      POSTGRES_DB: recruiting
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruiting -d recruiting"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - ./backend/storage:/app/storage
      - recordings:/app/storage/recordings
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NEXT_DIST_DIR: .next-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next-dev
    command: sh -lc 'mkdir -p "${NEXT_DIST_DIR:-.next-dev}" && find "${NEXT_DIST_DIR:-.next-dev}" -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true; npm run dev'

volumes:
  postgres_data:
  uploads:
  recordings:
